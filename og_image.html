<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0D2818;
    font-family: 'Noto Serif KR', 'Noto Sans KR', serif;
    display: flex;
    align-items: center;
    justify-content: center;
}

.wrap {
    width: 100%;
    height: 100%;
    position: relative;
    background: linear-gradient(135deg, #0D2818 0%, #1B4332 50%, #0D2818 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* 배경 원형 장식 */
.circle1 {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,168,67,0.08) 0%, transparent 70%);
    top: -100px; right: -100px;
}
.circle2 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(45,106,79,0.3) 0%, transparent 70%);
    bottom: -80px; left: -80px;
}
.line-deco {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
        linear-gradient(90deg, rgba(212,168,67,0.05) 1px, transparent 1px),
        linear-gradient(0deg, rgba(212,168,67,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
}

/* 메인 컨텐츠 */
.content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 0 80px;
    width: 100%;
}

/* 상단 배지 */
.badge {
    display: inline-block;
    background: rgba(212,168,67,0.15);
    border: 1px solid rgba(212,168,67,0.4);
    border-radius: 100px;
    padding: 8px 28px;
    font-size: 18px;
    color: #C9A84C;
    letter-spacing: 3px;
    font-weight: 700;
    margin-bottom: 28px;
}

/* 메인 타이틀 */
.main-title {
    font-size: 72px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.15;
    margin-bottom: 12px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    letter-spacing: -1px;
}
.main-title .accent {
    color: #C9A84C;
}

/* 구분선 */
.divider {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #C9A84C, transparent);
    margin: 24px auto;
    border-radius: 2px;
}

/* 심리테스트 홍보 */
.psych-section {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 22px 40px;
    display: inline-block;
    margin-bottom: 28px;
}
.psych-title {
    font-size: 26px;
    color: #FFFFFF;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
}
.psych-desc {
    font-size: 20px;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
    letter-spacing: 0.3px;
}
.psych-desc .highlight {
    color: #C9A84C;
    font-weight: 700;
}

/* 하단 정보 */
.bottom-info {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    margin-top: 8px;
}
.info-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 17px;
    color: rgba(255,255,255,0.55);
}
.info-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(212,168,67,0.5);
}

/* 로고 */
.logo {
    position: absolute;
    bottom: 28px;
    right: 40px;
    font-size: 15px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
    font-weight: 600;
}
</style>
</head>
<body>
<div class="wrap">
    <div class="circle1"></div>
    <div class="circle2"></div>
    <div class="line-deco"></div>

    <div class="content">
        <div class="badge">🌿 인생2막라디오</div>
        <div class="main-title">
            365일<br>
            오늘의 <span class="accent">인생 확언</span>
        </div>
        <div class="divider"></div>
        <div class="psych-section">
            <div class="psych-title">🧠 나는 어떤 사람일까?</div>
            <div class="psych-desc">
                세계 52개국 검증 · <span class="highlight">정확도 90%</span> 심리검사<br>
                성격 · 자존감 · 핵심강점 · 16가지 동물 유형 무료 분석
            </div>
        </div>
        <div class="bottom-info">
            <div class="info-item">✨ 완전 무료</div>
            <div class="info-dot"></div>
            <div class="info-item">⏱ 약 10분</div>
            <div class="info-dot"></div>
            <div class="info-item">📊 BFI-44 · RSE · VIA 기반</div>
        </div>
    </div>

    <div class="logo">life2radio.github.io/affirmation</div>
</div>
</body>
</html>
